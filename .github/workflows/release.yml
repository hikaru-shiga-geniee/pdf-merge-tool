name: Build and Release

on:
  push:
    tags: ['v*']

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: pdf-merger.exe
            asset_name: pdf-merger-windows.exe
          - os: macos-latest
            artifact_name: pdf-merger
            asset_name: pdf-merger-macos

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --extra build

      - name: Build executable
        run: |
          uv run pyinstaller --onefile --windowed --name pdf-merger src/main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.artifact_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            pdf-merger-windows.exe/pdf-merger.exe
            pdf-merger-macos/pdf-merger
          generate_release_notes: true
